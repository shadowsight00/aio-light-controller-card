name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Got an idea? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: How would this feature help you? What problem does it solve?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Have you tried any workarounds?
